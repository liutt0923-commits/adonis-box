<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adonis Box Snake</title>
    <link rel="stylesheet" href="style.css?v=20260618-soundfix">
  </head>
  <body>
    <main class="app-shell">
      <section class="game-stage" aria-label="Snake game">
        <header class="topbar">
          <div>
            <p class="eyebrow">Adonis Box</p>
            <h1>Snake</h1>
          </div>
          <div class="scoreboard" aria-label="Scores">
            <div>
              <span>Score</span>
              <strong id="score">0</strong>
            </div>
            <div>
              <span>Best</span>
              <strong id="bestScore">0</strong>
            </div>
          </div>
        </header>

        <div class="board-wrap">
          <canvas id="board" width="600" height="600" aria-label="Snake board"></canvas>
          <div class="overlay" id="overlay">
            <strong id="overlayTitle">Ready</strong>
            <span id="overlayText">Press start</span>
          </div>
        </div>

        <div class="controls" aria-label="Game controls">
          <button id="startBtn" type="button">Start</button>
          <button id="pauseBtn" type="button">Pause</button>
          <button id="restartBtn" type="button">Restart</button>
        </div>

        <div class="speed-panel" aria-label="Speed control">
          <span>Speed</span>
          <div class="speed-options">
            <label>
              <input type="radio" name="speed" value="slow">
              Slow
            </label>
            <label>
              <input type="radio" name="speed" value="normal" checked>
              Normal
            </label>
            <label>
              <input type="radio" name="speed" value="fast">
              Fast
            </label>
          </div>
        </div>

        <div class="sound-panel" aria-label="Sound control">
          <label>
            <input id="soundToggle" type="checkbox" checked>
            Sound
          </label>
        </div>

        <div class="dpad" aria-label="Direction controls">
          <button type="button" data-dir="up" aria-label="Up">^</button>
          <button type="button" data-dir="left" aria-label="Left">&lt;</button>
          <button type="button" data-dir="down" aria-label="Down">v</button>
          <button type="button" data-dir="right" aria-label="Right">&gt;</button>
        </div>
      </section>
    </main>

    <script src="script.js?v=20260618-soundfix"></script>
  </body>
</html>
